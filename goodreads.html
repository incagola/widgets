<!DOCTYPE html>
<html>
<head>
  <style type="text/css">
    html, body {
      background-color: #F0EFED !important; 
      margin: 0 !important;
      padding: 0 !important;
      height: 100%;
      width: 100%;
      display: flex;
      justify-content: center; 
      align-items: flex-start; 
      overflow: hidden !important;
    }

    .gr_grid_container {
      display: grid !important;
      grid-template-columns: repeat(3, 100px) !important; 
      grid-template-rows: repeat(2, 160px) !important;   
      gap: 0 !important; 
      width: 300px !important; 
      height: 320px !important; 
      background-color: #F0EFED !important;
      cursor: pointer;
    }

    .gr_grid_book_container {
      float: none !important;
      width: 100px !important;
      height: 160px !important;
      margin: 0 !important;
      padding: 0 !important;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    img {
      display: block !important;
      width: 92px !important; 
      height: 145px !important;
      object-fit: cover !important;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.15);
      pointer-events: none; /* This allows the click to pass through to our interceptor */
    }
  </style>
</head>
<body onclick="interceptClick(event)">

  <div id="gr_grid_widget_1773883795">
    <div class="gr_grid_container" id="grid-main">
      </div>
  </div>

  <script type="text/javascript">
    // 1. Force Randomness
    var randomSeed = Math.floor(Math.random() * 1000000);
    var grScript = document.createElement('script');
    grScript.src = "https://www.goodreads.com/review/grid_widget/199668457.Random%20Favs%20Of%20Tin%20Read%20Since%202025?cover_size=medium&hide_link=true&hide_title=true&num_books=6&order=d&shelf=recent-favs&sort=random&widget_id=1773883795&cachebust=" + randomSeed;
    document.body.appendChild(grScript);

    // 2. The Link Interceptor
    function interceptClick(e) {
      // Find the closest link or image that was clicked
      var target = e.target;
      var container = target.closest('.gr_grid_book_container');
      
      if (container) {
        e.preventDefault();
        e.stopPropagation();
        
        var link = container.querySelector('a');
        if (link) {
          var href = link.getAttribute('href');
          // Extract the Book ID from the link
          // Goodreads URLs look like: /book/show/12345-title
          var match = href.match(/\/book\/show\/(\d+)/);
          if (match && match[1]) {
            window.open("https://www.goodreads.com/book/show/" + match[1], "_blank");
          }
        }
      }
    }
  </script>

</body>
</html>
