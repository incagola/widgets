<!DOCTYPE html>
<html>
<head>
  <style type="text/css">
    /* 1. Set the background to Notion's Light Gray */
    html, body {
      background-color: #F7F7F7 !important; 
      margin: 0 !important;
      padding: 0 !important;
      height: 100%;
      width: 100%;
      display: flex;
      justify-content: center; 
      align-items: flex-start; 
      overflow: hidden !important;
    }

    /* 2. Fixed 3x2 Grid (Centered) */
    .gr_grid_container {
      display: grid !important;
      grid-template-columns: repeat(3, 100px) !important; 
      grid-template-rows: repeat(2, 160px) !important;   
      gap: 0 !important; 
      width: 300px !important; 
      height: 320px !important; 
      background-color: #F7F7F7 !important;
    }

    .gr_grid_book_container {
      float: none !important;
      width: 100px !important;
      height: 160px !important;
      margin: 0 !important;
      padding: 0 !important;
      border: none !important;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #gr_grid_widget_1773883795 {
      width: 300px !important;
      background: none !important;
    }

    img {
      display: block !important;
      width: 90px !important; 
      height: 145px !important;
      object-fit: cover !important;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <div id="gr_grid_widget_1773883795">
    <div class="gr_grid_container">
      </div>
  </div>

  <script src="https://www.goodreads.com/review/grid_widget/199668457.Random%20Favs%20Of%20Tin%20Read%20Since%202025?cover_size=medium&hide_link=true&hide_title=true&num_books=6&order=d&shelf=recent-favs&sort=random&widget_id=1773883795" type="text/javascript" charset="utf-8"></script>

  <script type="text/javascript">
    /* This script waits for the books to load, then forces links to open in a NEW TAB */
    window.onload = function() {
      setTimeout(function() {
        var links = document.getElementsByTagName('a');
        for (var i = 0; i < links.length; i++) {
          links[i].setAttribute('target', '_blank');
          links[i].setAttribute('rel', 'noopener noreferrer');
        }
      }, 1000); // Waits 1 second for the Goodreads script to finish
    };
  </script>

</body>
</html>
