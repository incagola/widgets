<!DOCTYPE html>
<html>
<head>
  <style type="text/css">
    /* 1. Force Transparency on everything */
    html, body, #gr_grid_widget_1773883795, .gr_grid_container {
      background-color: transparent !important;
      background: none !important;
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important; /* Kills the scrollbar */
    }

    /* 2. Create the tight 3x3 Grid */
    .gr_grid_container {
      display: grid !important;
      grid-template-columns: repeat(3, 1fr) !important; /* 3 equal columns */
      gap: 0 !important; /* Removes all space between books */
      width: fit-content !important;
    }

    /* 3. Reset the Goodreads individual book boxes */
    .gr_grid_book_container {
      float: none !important; /* Important: stops them from stacking weirdly */
      width: 98px !important;  /* Match Goodreads default cover width */
      height: 160px !important; /* Match Goodreads default cover height */
      margin: 0 !important;
      padding: 0 !important;
      border: none !important;
    }

    /* 4. Make sure images fill their 1/3rd slot perfectly */
    .gr_grid_book_container img {
      display: block !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }
  </style>
</head>
<body>

  <div id="gr_grid_widget_1773883795">
    <div class="gr_grid_container">
      </div>
  </div>

  <script src="https://www.goodreads.com/review/grid_widget/199668457.Random%20Favs%20Of%20Tin%20Read%20Since%202025?cover_size=medium&hide_link=true&hide_title=true&num_books=9&order=d&shelf=recent-favs&sort=random&widget_id=1773883795" type="text/javascript" charset="utf-8"></script>

</body>
</html>
