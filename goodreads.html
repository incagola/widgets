<!DOCTYPE html>
<html>
<head>
  <style type="text/css">
    /* 1. Set the background to Notion's Dark Gray */
    html, body {
      background-color: rgb(25, 25, 25) !important; /* Change to #ffffff for Light Mode */
      margin: 0 !important;
      padding: 0 !important;
      overflow: hidden !important;
      display: flex;
      justify-content: flex-start;
    }

    /* 2. Create the tight 3-wide Grid */
    .gr_grid_container {
      display: grid !important;
      grid-template-columns: repeat(3, 98px) !important; /* 3 columns at exactly book width */
      grid-template-rows: repeat(2, 160px) !important;   /* 2 rows at exactly book height */
      gap: 0 !important; 
      width: 294px !important; /* 98px * 3 */
      height: 320px !important; /* 160px * 2 */
      background-color: rgb(25, 25, 25) !important;
    }

    /* 3. Reset individual book boxes */
    .gr_grid_book_container {
      float: none !important;
      width: 98px !important;
      height: 160px !important;
      margin: 0 !important;
      padding: 0 !important;
      border: none !important;
      background-color: rgb(25, 25, 25) !important;
    }

    #gr_grid_widget_1773883795 {
      width: 294px !important;
      background: none !important;
    }

    img {
      display: block !important;
      width: 98px !important;
      height: 160px !important;
      object-fit: cover !important;
    }
  </style>
</head>
