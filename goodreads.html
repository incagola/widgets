<!DOCTYPE html>
<html>
<head>
  <style type="text/css">
    html, body {
      background-color: #F0EFED !important; 
      margin: 0 !important; padding: 0 !important;
      height: 100%; width: 100%;
      display: flex; justify-content: center; align-items: flex-start;
      overflow: hidden !important;
    }

    /* The actual Goodreads widget (Hidden from clicks) */
    #gr_grid_widget_1773883795 {
      width: 300px !important;
      pointer-events: none !important; /* Makes the widget "ghost-like" so it can't capture clicks */
    }

    .gr_grid_container {
      display: grid !important;
      grid-template-columns: repeat(3, 100px) !important; 
      grid-template-rows: repeat(2, 160px) !important;   
      width: 300px !important; height: 320px !important;
      background-color: #F0EFED !important;
    }

    /* The Invisible Clicking Layer */
    #click-layer {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 300px; height: 320px;
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(2, 160px);
      z-index: 999; /* Sits on top of everything */
    }

    .hit-box {
      width: 100%; height: 100%;
      cursor: pointer;
      background: rgba(255,0,0,0); /* Transparent, but exists */
    }

    img {
      display: block !important;
      width: 92px !important; height: 145px !important;
      object-fit: cover !important;
      margin: 7px 4px !important; /* Centers cover in the 100x160 box */
      box-shadow: 2px 2px 5px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>

  <div id="click-layer">
    <div class="hit-box" onclick="goToBook(0)"></div>
    <div class="hit-box" onclick="goToBook(1)"></div>
    <div class="hit-box" onclick="goToBook(2)"></div>
    <div class="hit-box" onclick="goToBook(3)"></div>
    <div class="hit-box" onclick="goToBook(4)"></div>
    <div class="hit-box" onclick="goToBook(5)"></div>
  </div>

  <div id="gr_grid_widget_1773883795">
    <div class="gr_grid_container"></div>
  </div>

  <script type="text/javascript">
    // Randomizer
    var randomSeed = Math.floor(Math.random() * 1000000);
    var grScript = document.createElement('script');
    grScript.src = "https://www.goodreads.com/review/grid_widget/199668457.Random%20Favs%20Of%20Tin%20Read%20Since%202025?cover_size=medium&hide_link=true&hide_title=true&num_books=6&order=d&shelf=recent-favs&sort=random&widget_id=1773883795&cachebust=" + randomSeed;
    document.body.appendChild(grScript);

    function goToBook(index) {
      // We wait for the widget to load, then find the link Goodreads generated
      var allLinks = document.querySelectorAll('.gr_grid_book_container a');
      if (allLinks[index]) {
        var href = allLinks[index].getAttribute('href');
        // Extract the ID and build a CLEAN book URL
        var match = href.match(/\/book\/show\/(\d+)/);
        if (match) {
          window.open("https://www.goodreads.com/book/show/" + match[1], "_blank");
        }
      }
    }
  </script>

</body>
</html>
