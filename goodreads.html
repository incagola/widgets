<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style type="text/css">
    /* 1. Remove all default backgrounds and scrollbars */
    html, body {
      background-color: transparent !important;
      margin: 0;
      padding: 0;
      overflow-x: hidden; /* Prevent horizontal scrolling */
    }

    /* 2. Force the Goodreads widget to be transparent and full-height */
    #gr_grid_widget_1773883795 {
      background-color: transparent !important;
      width: 100% !important;
      height: auto !important;
    }

    /* 3. The Vertical Stack "Magic" */
    .gr_grid_container {
      display: flex !important;
      flex-direction: column !important; /* Forces vertical layout */
      align-items: center !important;    /* Centers the covers */
      background: none !important;
      height: auto !important;
      border: none !important;
    }

    /* 4. Individual Book Spacing */
    .gr_grid_book_container {
      float: none !important; /* Overrides Goodreads' horizontal float */
      width: auto !important;
      height: auto !important; 
      padding: 15px 0 !important; /* Adds space between books */
      margin: 0 auto !important;
      border: none !important;
    }

    /* 5. Clean up image borders */
    img {
      border-radius: 4px; /* Optional: gives books slightly rounded corners */
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* Optional: adds a slight depth */
    }
  </style>
</head>
<body>

  <div id="gr_grid_widget_1773883795">
    <div class="gr_grid_container">
      </div>
  </div>

  <script src="https://www.goodreads.com/review/grid_widget/199668457.Random%20Favs%20Of%20Tin%20Read%20Since%202025?cover_size=medium&hide_link=true&hide_title=true&num_books=9&order=d&shelf=recent-favs&sort=random&widget_id=1773883795" type="text/javascript" charset="utf-8"></script>

</body>
</html>
