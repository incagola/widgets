<!DOCTYPE html>
<html>
<head>
  <style type="text/css">
    html, body {
      background-color: #F0EFED !important; 
      margin: 0 !important;
      padding: 0 !important;
      height: 100%;
      width: 100%;
      display: flex;
      justify-content: center; 
      align-items: flex-start; 
      overflow: hidden !important;
    }

    .gr_grid_container {
      display: grid !important;
      grid-template-columns: repeat(3, 100px) !important; 
      grid-template-rows: repeat(2, 160px) !important;   
      gap: 0 !important; 
      width: 300px !important; 
      height: 320px !important; 
      background-color: #F0EFED !important;
    }

    .gr_grid_book_container {
      float: none !important;
      width: 100px !important;
      height: 160px !important;
      margin: 0 !important;
      padding: 0 !important;
      border: none !important;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #gr_grid_widget_1773883795 {
      width: 300px !important;
      background: none !important;
    }

    img {
      display: block !important;
      width: 92px !important; 
      height: 145px !important;
      object-fit: cover !important;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.15);
    }
  </style>
</head>
<body>

  <div id="gr_grid_widget_1773883795">
    <div class="gr_grid_container" id="widget-target">
      </div>
  </div>

  <script type="text/javascript">
    // 1. FORCE RANDOMNESS (The Cache Buster)
    // We append a random number to the URL so Goodreads thinks it's a new request every time.
    var randomSeed = Math.floor(Math.random() * 1000000);
    var grScript = document.createElement('script');
    grScript.src = "https://www.goodreads.com/review/grid_widget/199668457.Random%20Favs%20Of%20Tin%20Read%20Since%202025?cover_size=medium&hide_link=true&hide_title=true&num_books=6&order=d&shelf=recent-favs&sort=random&widget_id=1773883795&cachebust=" + randomSeed;
    grScript.type = "text/javascript";
    grScript.charset = "utf-8";
    document.body.appendChild(grScript);

    // 2. AGGRESSIVE LINK OVERRIDE
    // This runs every 500ms to catch the links the moment they appear
    var linkFixer = setInterval(function() {
      var links = document.getElementsByTagName('a');
      if (links.length > 0) {
        for (var i = 0; i < links.length; i++) {
          var href = links[i].getAttribute('href');
          
          // If the link contains a book ID, rebuild it to the main book page
          if (href && href.includes('/book/show/')) {
            var parts = href.split('/book/show/');
            var bookId = parts[1].split('-')[0].split('?')[0].split('.')[0]; 
            links[i].href = "https://www.goodreads.com/book/show/" + bookId;
          }
          
          links[i].target = "_blank";
          links[i].rel = "noopener noreferrer";
        }
      }
    }, 500);

    // Stop looking for links after 10 seconds to save battery/CPU
    setTimeout(function() { clearInterval(linkFixer); }, 10000);
  </script>

</body>
</html>
